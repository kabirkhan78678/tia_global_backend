<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password | TIA Global</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/reset-password.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <div class="reset-card">
        <!-- Logo -->
        <div class="logo-area">
          <!-- Replace with your logo -->
          <img src="/Tarbiytul ilm logo 1.png" alt="TIA Global" />

          <h1>TIA Global</h1>
        </div>

        <!-- Heading -->

        <h2>Change Password</h2>

        <p class="subtitle">
          Create a strong password for your account.<br />
          Make sure it's at least 6 characters long.
        </p>

        <!-- Message -->

        <div id="message" class="message"></div>

        <!-- Form -->

        <form id="resetForm">
          <!-- Password -->

          <div class="form-group">
            <label> New Password </label>

            <div class="input-group">
              <span class="icon">
                <i class="fa-solid fa-lock"></i>
              </span>

              <input
                type="password"
                id="password"
                name="password"
                minlength="6"
                autocomplete="new-password"
                placeholder="Enter new password"
                required
              />

              <span class="toggle-password" data-target="password">
                <i class="fa-regular fa-eye"></i>
              </span>
            </div>
          </div>

          <!-- Confirm Password -->

          <div class="form-group">
            <label> Confirm Password </label>

            <div class="input-group">
              <span class="icon">
                <i class="fa-solid fa-lock"></i>
              </span>

              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                minlength="6"
                autocomplete="new-password"
                placeholder="Confirm password"
                required
              />

              <span class="toggle-password" data-target="confirmPassword">
                <i class="fa-regular fa-eye"></i>
              </span>
            </div>
          </div>

          <!-- Password Strength -->

          <div class="strength-wrapper">
            <div class="strength-bar">
              <div id="strengthFill"></div>
            </div>

            <span id="strengthText"> Password Strength </span>
          </div>

          <!-- Button -->

          <button type="submit" id="submitButton">Change Password</button>
        </form>
      </div>

      <!-- Footer -->

      <div class="footer">© 2026 TIA Global. All rights reserved.</div>
    </div>

    <!-- JS -->

    <script src="/reset-password.js"></script>
  </body>
</html>
