<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | TIA Global</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #172033;
      padding: 24px;
    }

    main {
      width: min(100%, 420px);
      background: #ffffff;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    p {
      margin: 0 0 22px;
      color: #5c667a;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid #c9d3e2;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 16px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: #1769e0;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      display: none;
      line-height: 1.4;
    }

    .success {
      display: block;
      background: #e8f7ee;
      color: #146b34;
    }

    .error {
      display: block;
      background: #fdecec;
      color: #9b1c1c;
    }
  </style>
</head>
<body>
  <main>
    <h1>Reset Password</h1>
    <p>Enter your new password to update your TIA Global account.</p>

    <form id="resetForm">
      <label for="password">New password</label>
      <input id="password" name="password" type="password" minlength="6" required>

      <label for="confirmPassword">Confirm password</label>
      <input id="confirmPassword" name="confirmPassword" type="password" minlength="6" required>

      <button id="submitButton" type="submit">Change Password</button>
    </form>

    <div id="message" class="message"></div>
  </main>

  <script>
    const form = document.getElementById('resetForm');
    const button = document.getElementById('submitButton');
    const message = document.getElementById('message');
    const token = new URLSearchParams(window.location.search).get('token');

    const showMessage = (text, type) => {
      message.textContent = text;
      message.className = `message ${type}`;
    };

    if (!token) {
      form.style.display = 'none';
      showMessage('Reset token is missing or invalid.', 'error');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showMessage('Passwords do not match.', 'error');
        return;
      }

      button.disabled = true;
      button.textContent = 'Updating...';

      try {
        const response = await fetch('/api/users/auth/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ password }),
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.message || 'Unable to reset password.');
        }

        form.reset();
        form.style.display = 'none';
        showMessage('Password changed successfully. You can now log in.', 'success');
      } catch (error) {
        showMessage(error.message, 'error');
      } finally {
        button.disabled = false;
        button.textContent = 'Change Password';
      }
    });
  </script>
</body>
</html>
